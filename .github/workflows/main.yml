name: Build and Deploy Rust Webserver

on:
  push:
    branches:
      - release  # Trigger only on pushes to release branch

jobs:
  build-and-deploy:
    runs-on: self-hosted  # your self-hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (if not already installed)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Build release binary
        run: cargo build --release

      - name: Stop old instance
        run: |
          # Kill existing screen session if running
          if screen -list | grep -q "rust_webserver"; then
            screen -S rust_webserver -X quit
          fi

      - name: Deploy binary
        run: |
          # Ensure target location exists
          mkdir -p ~/bin
          # Copy new binary
          cp target/release/rust_webserver ~/bin/rust_webserver
          # Start in a detached screen session
          screen -dmS rust_webserver ~/bin/rust_webserver
